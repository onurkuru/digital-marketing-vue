[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/api/task-submission"
  to = "/.netlify/functions/task-submission"
  status = 200

[[redirects]]
  from = "/api/runtime-config"
  to = "/.netlify/functions/runtime-config"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
