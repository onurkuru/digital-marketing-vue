<html>
  <body
    style="
      margin: 0;
      padding: 24px;
      background: #f4f6f8;
      font-family: Arial, 'Segoe UI', sans-serif;
      color: #1f2937;
    "
  >
    <table
      role="presentation"
      width="100%"
      cellpadding="0"
      cellspacing="0"
      style="max-width: 760px; margin: 0 auto; background: #ffffff; border-radius: 8px; border: 1px solid #e5e7eb;"
    >
      <tr>
        <td style="padding: 20px 24px; border-bottom: 1px solid #e5e7eb;">
          <h1 style="margin: 0; font-size: 22px; line-height: 1.3;">Yeni Görev Teslimi</h1>
          <p style="margin: 8px 0 0; color: #4b5563; font-size: 14px;">{{submittedAt}}</p>
        </td>
      </tr>
      <tr>
        <td style="padding: 16px 24px;">
          <p style="margin: 0 0 8px;"><strong>Gönderen:</strong> {{fullName}}</p>
          <p style="margin: 0 0 8px;"><strong>E-posta:</strong> {{senderEmail}}</p>
          <p style="margin: 0 0 8px;"><strong>Seviye:</strong> {{levelId}}</p>
          <p style="margin: 0 0 8px;"><strong>Görev ID:</strong> {{taskId}}</p>
          <p style="margin: 0 0 16px;"><strong>Görev Başlığı:</strong> {{taskTitle}}</p>

          <p style="margin: 0 0 6px;"><strong>Konu</strong></p>
          <div
            style="
              margin: 0 0 16px;
              padding: 10px 12px;
              border-radius: 6px;
              border: 1px solid #e5e7eb;
              background: #f9fafb;
            "
          >
            {{summary}}
          </div>

          <p style="margin: 0 0 6px;"><strong>Teslim Detayı</strong></p>
          <div
            style="
              margin: 0 0 16px;
              padding: 10px 12px;
              border-radius: 6px;
              border: 1px solid #e5e7eb;
              background: #f9fafb;
              white-space: pre-line;
            "
          >
            {{details}}
          </div>

          <p style="margin: 0 0 6px;"><strong>Ek Notlar</strong></p>
          <div
            style="
              margin: 0 0 4px;
              padding: 10px 12px;
              border-radius: 6px;
              border: 1px solid #e5e7eb;
              background: #f9fafb;
              white-space: pre-line;
            "
          >
            {{notes}}
          </div>

          <p style="margin: 12px 0 0; color: #374151; font-size: 13px;">
            <strong>Ek Dosya Sayısı:</strong> {{attachmentCount}}
          </p>
        </td>
      </tr>
    </table>
  </body>
</html>
